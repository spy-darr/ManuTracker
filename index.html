<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManuTrack — Manufacturing Project System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #171d2e;
    --surface3: #1e2740;
    --border: #2a3352;
    --accent: #3d7eff;
    --accent2: #00e5b0;
    --danger: #ff4d6a;
    --warn: #ffb340;
    --success: #00c97a;
    --text: #e8edf8;
    --muted: #6b7a99;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── LOGIN SCREEN ─── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(ellipse 80% 60% at 60% 40%, #1a2a5e 0%, #0a0d14 70%);
  }
  #loginScreen::before {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 39px, #1e2740 39px, #1e2740 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, #1e2740 39px, #1e2740 40px);
    opacity:0.25;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .login-logo {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .login-logo span { color: var(--accent); }
  .login-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 36px;
    font-family: var(--font-mono);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .role-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
  }
  .role-btn .role-icon { font-size: 22px; margin-bottom: 6px; display:block; }
  .role-btn:hover { border-color: var(--accent); color: var(--text); }
  .role-btn.active { border-color: var(--accent); background: rgba(61,126,255,0.12); color: var(--accent); }

  .login-field { margin-bottom: 14px; }
  .login-field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-family:var(--font-mono); letter-spacing:0.5px; text-transform:uppercase; }
  .login-field select,
  .login-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .login-field select:focus,
  .login-field input:focus { border-color: var(--accent); }
  .login-field select option { background: var(--surface2); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-top: 8px;
    transition: opacity .2s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 10px; text-align:center; min-height:18px; }

  /* ─── APP SHELL ─── */
  #appShell { display:none; min-height:100vh; }

  .topbar {
    height: 58px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    position: sticky; top:0; z-index:100;
  }
  .topbar-logo { font-family:var(--font-head); font-weight:800; font-size:18px; }
  .topbar-logo span { color:var(--accent); }
  .topbar-role {
    background: rgba(61,126,255,0.15);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(61,126,255,0.3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .topbar-user { color: var(--muted); font-size: 13px; margin-left:4px; }
  .topbar-spacer { flex:1; }
  .alert-bell {
    background: none; border: none; cursor:pointer;
    color: var(--muted); font-size: 18px; position:relative;
    padding: 6px;
  }
  .alert-count {
    position:absolute; top:0; right:0;
    background: var(--danger);
    color:#fff; font-size:10px; font-family:var(--font-mono);
    width:16px; height:16px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .logout-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    cursor:pointer; font-size:13px;
    font-family:var(--font-body);
    transition: all .2s;
  }
  .logout-btn:hover { color:var(--danger); border-color:var(--danger); }

  /* ─── LAYOUT ─── */
  .layout { display:flex; min-height:calc(100vh - 58px); }
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
  }
  .nav-item {
    display: flex; align-items:center; gap:10px;
    padding: 10px 20px;
    color: var(--muted);
    font-size: 13.5px;
    cursor: pointer;
    transition: all .15s;
    border-left: 2px solid transparent;
    user-select:none;
  }
  .nav-item:hover { color:var(--text); background:var(--surface2); }
  .nav-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(61,126,255,0.08); }
  .nav-item .nav-icon { font-size:16px; width:20px; text-align:center; }
  .nav-section { font-family:var(--font-mono); font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; padding:18px 20px 6px; }

  .main { flex:1; padding: 28px 32px; overflow-y:auto; }
  .page { display:none; }
  .page.active { display:block; }

  /* ─── COMMON COMPONENTS ─── */
  .page-title {
    font-family: var(--font-head);
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    display:flex; align-items:center; gap:8px;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 9px 18px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn:hover { opacity:.85; }
  .btn-outline {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 8px 16px;
    font-size: 13px;
    cursor:pointer;
    font-family:var(--font-body);
    transition: all .2s;
  }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:var(--danger); }
  .btn-success { background:var(--success); }
  .btn-sm { padding:6px 12px; font-size:12px; }

  .badge {
    display:inline-flex; align-items:center;
    padding: 2px 8px; border-radius:20px;
    font-size:11px; font-family:var(--font-mono); font-weight:500;
    letter-spacing:0.3px;
  }
  .badge-success { background:rgba(0,201,122,0.15); color:var(--success); border:1px solid rgba(0,201,122,0.3); }
  .badge-danger { background:rgba(255,77,106,0.15); color:var(--danger); border:1px solid rgba(255,77,106,0.3); }
  .badge-warn { background:rgba(255,179,64,0.15); color:var(--warn); border:1px solid rgba(255,179,64,0.3); }
  .badge-info { background:rgba(61,126,255,0.15); color:var(--accent); border:1px solid rgba(61,126,255,0.3); }
  .badge-muted { background:rgba(107,122,153,0.15); color:var(--muted); border:1px solid rgba(107,122,153,0.3); }

  /* Flash animation for overdue */
  @keyframes flash-border {
    0%,100% { border-color: var(--danger); box-shadow: 0 0 0 0 rgba(255,77,106,0); }
    50% { border-color: #ff0033; box-shadow: 0 0 12px 3px rgba(255,77,106,0.35); }
  }
  .overdue-flash { animation: flash-border 1.6s ease-in-out infinite; }

  /* ─── PROJECT CARDS ─── */
  .projects-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:16px; }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor:pointer;
    transition: all .2s;
  }
  .project-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .project-card.delayed { border-color: var(--danger); }
  .project-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
  .project-name { font-family:var(--font-head); font-size:16px; font-weight:700; }
  .project-id { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .project-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .project-progress { margin-bottom:6px; }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:5px; }
  .progress-bar { height:5px; background:var(--surface3); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .4s; }

  /* ─── DEPT PIPELINE ─── */
  .dept-pipeline { display:flex; flex-direction:column; gap:10px; }
  .dept-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display:flex; align-items:center; gap:14px;
  }
  .dept-row.overdue-flash { }
  .dept-name { font-weight:600; font-size:13px; width:110px; flex-shrink:0; }
  .dept-steps { flex:1; display:flex; gap:6px; flex-wrap:wrap; }
  .step-chip {
    padding: 4px 10px;
    border-radius: 6px;
    font-size:11px;
    font-family:var(--font-mono);
    border: 1px solid var(--border);
    cursor:pointer;
    transition: all .15s;
    background: var(--surface3);
    color: var(--muted);
  }
  .step-chip.done { background:rgba(0,201,122,0.12); color:var(--success); border-color:rgba(0,201,122,0.3); }
  .step-chip.inprogress { background:rgba(61,126,255,0.12); color:var(--accent); border-color:rgba(61,126,255,0.3); }
  .step-chip.overdue { background:rgba(255,77,106,0.12); color:var(--danger); border-color:rgba(255,77,106,0.3); animation: flash-border 1.5s infinite; }
  .dept-deadline { font-family:var(--font-mono); font-size:11px; color:var(--muted); white-space:nowrap; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:1000; display:none;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:32px;
    width:600px; max-width:95vw; max-height:90vh;
    overflow-y:auto;
    box-shadow: 0 40px 100px rgba(0,0,0,0.7);
  }
  .modal-title { font-family:var(--font-head); font-size:20px; font-weight:800; margin-bottom:4px; }
  .modal-sub { color:var(--muted); font-size:13px; margin-bottom:24px; }
  .modal-close { float:right; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; margin-top:-4px; }
  .modal-close:hover { color:var(--danger); }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:11px; color:var(--muted); margin-bottom:6px; font-family:var(--font-mono); letter-spacing:0.5px; text-transform:uppercase; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width:100%;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:7px;
    padding:10px 12px;
    color:var(--text);
    font-family:var(--font-body);
    font-size:13px;
    outline:none;
    transition:border-color .2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color:var(--accent); }
  .form-group textarea { resize:vertical; min-height:70px; }
  .form-group select option { background:var(--surface2); }
  .form-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

  /* ─── STATS ROW ─── */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .stat-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:18px;
  }
  .stat-label { font-size:11px; color:var(--muted); font-family:var(--font-mono); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .stat-value { font-family:var(--font-head); font-size:28px; font-weight:800; }
  .stat-sub { font-size:11px; color:var(--muted); margin-top:3px; }

  /* ─── TABLE ─── */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-family:var(--font-mono); font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; padding:10px 14px; border-bottom:1px solid var(--border); }
  td { padding:12px 14px; font-size:13px; border-bottom:1px solid rgba(42,51,82,0.5); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }

  /* ─── ALERT PANEL ─── */
  .alert-panel {
    position:fixed; top:58px; right:0; width:340px;
    background:var(--surface); border-left:1px solid var(--border);
    height:calc(100vh - 58px); overflow-y:auto;
    z-index:200; transform:translateX(100%); transition:transform .3s;
    padding:20px;
  }
  .alert-panel.open { transform:translateX(0); }
  .alert-item {
    background:var(--surface2);
    border-left:3px solid var(--danger);
    border-radius:0 8px 8px 0;
    padding:12px 14px;
    margin-bottom:10px;
    font-size:12.5px;
  }
  .alert-item .alert-proj { font-weight:600; margin-bottom:3px; }
  .alert-item .alert-msg { color:var(--muted); }
  .alert-item .alert-time { font-family:var(--font-mono); font-size:10px; color:var(--danger); margin-top:4px; }

  /* ─── DEPT UPDATE PAGE ─── */
  .step-update-row {
    display:flex; align-items:center; gap:12px;
    padding:12px 0; border-bottom:1px solid rgba(42,51,82,0.5);
  }
  .step-update-row:last-child { border-bottom:none; }
  .step-num { font-family:var(--font-mono); font-size:11px; color:var(--muted); width:24px; }
  .step-name-label { flex:1; font-size:13px; }
  .step-deadline-info { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .step-status-select {
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:6px;
    padding:5px 10px;
    color:var(--text);
    font-size:12px;
    font-family:var(--font-body);
    outline:none;
    cursor:pointer;
  }
  .step-status-select:focus { border-color:var(--accent); }

  /* ─── HOD OVERVIEW ─── */
  .hod-project-row {
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 20px;
    margin-bottom:12px;
  }
  .hod-proj-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; }
  .hod-proj-name { font-family:var(--font-head); font-size:15px; font-weight:700; flex:1; }
  .hod-dept-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .hod-dept-cell {
    background:var(--surface3);
    border-radius:7px;
    padding:10px 12px;
    font-size:12px;
  }
  .hod-dept-label { color:var(--muted); font-size:10px; font-family:var(--font-mono); letter-spacing:0.5px; margin-bottom:4px; }
  .hod-dept-pct { font-family:var(--font-head); font-size:18px; font-weight:800; }

  /* ─── NOTIFICATION TOAST ─── */
  .toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px 20px;
    font-size:13px;
    z-index:2000;
    transform:translateY(80px); opacity:0;
    transition: all .3s;
    max-width:320px;
  }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { border-color:var(--success); }
  .toast.error { border-color:var(--danger); }

  .section-divider { height:1px; background:var(--border); margin:20px 0; }

  /* ─── RESPONSIVE ─── */
  @media(max-width:768px) {
    .stats-row { grid-template-columns:1fr 1fr; }
    .hod-dept-grid { grid-template-columns:1fr 1fr; }
    .form-row { grid-template-columns:1fr; }
    .sidebar { display:none; }
  }

  .empty-state {
    text-align:center; padding:60px 20px; color:var(--muted);
  }
  .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  .inline-edit { display:inline-flex; align-items:center; gap:6px; }
  .inline-input {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:5px; padding:3px 8px; color:var(--text);
    font-size:12px; font-family:var(--font-mono); outline:none;
  }
  .inline-input:focus { border-color:var(--accent); }

  .delay-banner {
    background:rgba(255,77,106,0.1);
    border:1px solid rgba(255,77,106,0.3);
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:16px;
    display:flex; align-items:center; gap:10px;
    font-size:13px;
    color: var(--danger);
  }

  /* Step management in admin */
  .steps-list { display:flex; flex-direction:column; gap:6px; }
  .step-admin-row {
    display:flex; align-items:center; gap:10px;
    background:var(--surface2); border-radius:7px; padding:10px 12px;
    border:1px solid var(--border);
  }
  .step-admin-name { flex:1; font-size:13px; }
  .step-admin-deadline { font-family:var(--font-mono); font-size:11px; color:var(--muted); }

  .chevron { transition: transform .2s; }
  .chevron.open { transform: rotate(90deg); }
</style>
</head>
<body>

<!-- ════════ LOGIN SCREEN ════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Manu<span>Track</span></div>
    <div class="login-sub">Manufacturing Project System</div>

    <div class="role-grid">
      <div class="role-btn active" onclick="selectRole('admin')" id="roleBtn-admin">
        <span class="role-icon">🛡️</span>Project Admin
      </div>
      <div class="role-btn" onclick="selectRole('dept')" id="roleBtn-dept">
        <span class="role-icon">🏭</span>Department
      </div>
      <div class="role-btn" onclick="selectRole('hod')" id="roleBtn-hod">
        <span class="role-icon">👔</span>HOD
      </div>
      <div class="role-btn" onclick="selectRole('engineer')" id="roleBtn-engineer">
        <span class="role-icon">⚙️</span>Project Engineer
      </div>
    </div>

    <div id="deptSelect" class="login-field" style="display:none">
      <label>Department</label>
      <select id="loginDept">
        <option value="marketing">Marketing</option>
        <option value="engineering">Engineering</option>
        <option value="purchase">Purchase</option>
        <option value="qac">QAC</option>
        <option value="welding">Welding</option>
        <option value="production">Production</option>
        <option value="logistics">Logistics</option>
        <option value="finance">Finance</option>
      </select>
    </div>

    <div class="login-field">

<script>
// ════════════════════════════════════════
//  DATA LAYER — localStorage persistence
// ════════════════════════════════════════
const DEPTS = ['Marketing','Engineering','Purchase','QAC','Welding','Production','Logistics','Finance'];

function loadData() {
  const raw = localStorage.getItem('manutrack_data');
  if (raw) return JSON.parse(raw);
  // Default seed data
  return {
    projects: [],
    nextProjectId: 1
  };
}

function saveData(data) {
  localStorage.setItem('manutrack_data', JSON.stringify(data));
}

let DB = loadData();

// ════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════
const PASSWORDS = { admin:'admin123', dept:'dept123', hod:'hod123', engineer:'eng123' };
let currentUser = null;
let selectedRole = 'admin';

function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('roleBtn-'+role).classList.add('active');
  document.getElementById('deptSelect').style.display = role === 'dept' ? 'block' : 'none';
}

function doLogin() {
  const pw = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  if (pw !== PASSWORDS[selectedRole]) {
    err.textContent = 'Incorrect password. Please try again.';
    return;
  }
  err.textContent = '';
  const dept = selectedRole === 'dept' ? document.getElementById('loginDept').value : null;
  currentUser = { role: selectedRole, dept };
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  bootApp();
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginPassword').value = '';
}

// ════════════════════════════════════════
//  APP BOOT
// ════════════════════════════════════════
let currentPage = null;

function bootApp() {
  const r = currentUser.role;
  document.getElementById('topbarRole').textContent = r === 'admin' ? 'PROJECT ADMIN' : r === 'dept' ? currentUser.dept.toUpperCase() : r === 'hod' ? 'HOD' : 'ENGINEER';
  document.getElementById('topbarUser').textContent = r === 'dept' ? `— ${DEPTS.find(d=>d.toLowerCase()===currentUser.dept)}` : '';

  // Build sidebar
  const nav = {
    admin: [
      { icon:'📋', label:'Dashboard', page:'adminDashboard' },
      { icon:'📁', label:'All Projects', page:'adminProjects' },
      { icon:'➕', label:'New Project', page:'adminNewProject' },
    ],
    dept: [
      { icon:'📋', label:'My Dashboard', page:'deptDashboard' },
      { icon:'✏️', label:'Update Work', page:'deptUpdate' },
    ],
    hod: [
      { icon:'📊', label:'Overview', page:'hodOverview' },
      { icon:'📁', label:'All Projects', page:'hodProjects' },
    ],
    engineer: [
      { icon:'📋', label:'Dashboard', page:'engDashboard' },
      { icon:'⚠️', label:'Overdue Alerts', page:'engAlerts' },
    ]
  };

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `<div class="nav-section">Navigation</div>` +
    nav[r].map(n => `<div class="nav-item" id="nav-${n.page}" onclick="showPage('${n.page}')">
      <span class="nav-icon">${n.icon}</span>${n.label}
    </div>`).join('');

  // Show alert bell for engineer
  if (r === 'engineer' || r === 'admin') {
    document.getElementById('alertBell').style.display = 'block';
  }

  showPage(nav[r][0].page);
  updateAlerts();
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if (navEl) navEl.classList.add('active');
  const main = document.getElementById('mainArea');
  main.innerHTML = '';
  pages[page](main);
}

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { if(!d)return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function isOverdue(deadline) { if(!deadline)return false; return today() > deadline; }
function daysLeft(deadline) { if(!deadline)return null; const diff=Math.ceil((new Date(deadline)-new Date(today()))/(1000*86400)); return diff; }

function projectStatus(proj) {
  let anyOverdue = false;
  let allDone = true;
  for (const dept of DEPTS) {
    const steps = proj.deptSteps[dept] || [];
    for (const s of steps) {
      if (s.status !== 'done') allDone = false;
      if (s.status !== 'done' && isOverdue(s.deadline)) anyOverdue = true;
    }
  }
  if (allDone) return 'completed';
  if (anyOverdue) return 'delayed';
  return 'ontrack';
}

function projectProgress(proj) {
  let total = 0, done = 0;
  for (const dept of DEPTS) {
    const steps = proj.deptSteps[dept] || [];
    total += steps.length;
    done += steps.filter(s=>s.status==='done').length;
  }
  return total ? Math.round((done/total)*100) : 0;
}

function deptProgress(proj, dept) {
  const steps = proj.deptSteps[dept] || [];
  if (!steps.length) return 0;
  return Math.round((steps.filter(s=>s.status==='done').length / steps.length)*100);
}

function getOverdueItems() {
  const items = [];
  for (const proj of DB.projects) {
    for (const dept of DEPTS) {
      const steps = proj.deptSteps[dept] || [];
      for (const s of steps) {
        if (s.status !== 'done' && isOverdue(s.deadline)) {
          items.push({ proj, dept, step: s });
        }
      }
    }
  }
  return items;
}

function updateAlerts() {
  const items = getOverdueItems();
  const count = items.length;
  const countEl = document.getElementById('alertCount');
  const bell = document.getElementById('alertBell');
  if (!bell) return;
  if (count > 0) {
    countEl.style.display = 'flex';
    countEl.textContent = count;
  } else {
    countEl.style.display = 'none';
  }
  // Populate panel
  const list = document.getElementById('alertList');
  if (list) {
    list.innerHTML = items.length ? items.map(i => `
      <div class="alert-item">
        <div class="alert-proj">${i.proj.name} — ${i.dept}</div>
        <div class="alert-msg">Step: ${i.step.name}</div>
        <div class="alert-time">Deadline: ${fmtDate(i.step.deadline)} • ${Math.abs(daysLeft(i.step.deadline))}d overdue</div>
      </div>
    `).join('') : '<div style="color:var(--muted);font-size:13px;">No overdue items 🎉</div>';
  }
}

function toggleAlertPanel() {
  document.getElementById('alertPanel').classList.toggle('open');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>{ t.className='toast'; }, 3000);
}

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function makeProjectId() {
  return 'PROJ-' + String(DB.nextProjectId).padStart(4,'0');
}

// ════════════════════════════════════════
//  DEFAULT STEPS PER DEPT
// ════════════════════════════════════════
function defaultSteps(dept) {
  const map = {
    Marketing: ['Customer Inquiry','Requirement Analysis','Proposal Submission','Order Confirmation'],
    Engineering: ['Design Draft','Drawing Review','BOM Preparation','Design Approval'],
    Purchase: ['Vendor Selection','Purchase Order','Material Procurement','Delivery Verification'],
    QAC: ['Incoming Inspection','In-Process Inspection','Final Inspection','Quality Sign-off'],
    Welding: ['Fitment','Tack Welding','Full Welding','Post-Weld Inspection'],
    Production: ['Production Planning','Raw Material Issuance','Manufacturing','Assembly'],
    Logistics: ['Dispatch Planning','Packaging','Loading','Delivery'],
    Finance: ['Proforma Invoice','Payment Follow-up','Final Invoice','Closure']
  };
  return (map[dept] || ['Step 1','Step 2','Step 3']).map((n,i)=>({id:i, name:n, status:'pending', deadline:null, note:''}));
}

function initProjectDeptSteps(proj) {
  const steps = {};
  for (const d of DEPTS) {
    steps[d] = defaultSteps(d);
  }
  proj.deptSteps = steps;
}

// ════════════════════════════════════════
//  PAGES
// ════════════════════════════════════════
const pages = {};

// ─── ADMIN DASHBOARD ───
pages.adminDashboard = function(el) {
  const projects = DB.projects;
  const total = projects.length;
  const ontrack = projects.filter(p=>projectStatus(p)==='ontrack').length;
  const delayed = projects.filter(p=>projectStatus(p)==='delayed').length;
  const completed = projects.filter(p=>projectStatus(p)==='completed').length;
  const overdueCount = getOverdueItems().length;

  el.innerHTML = `
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Welcome back, Project Admin. Here's your overview.</div>

    ${overdueCount ? `<div class="delay-banner">⚠️ <strong>${overdueCount} overdue task${overdueCount>1?'s':''}</strong> across projects require attention.</div>` : ''}

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Projects</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">On Track</div>
        <div class="stat-value" style="color:var(--success)">${ontrack}</div>
        <div class="stat-sub">No delays</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delayed</div>
        <div class="stat-value" style="color:var(--danger)">${delayed}</div>
        <div class="stat-sub">Past deadline</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value" style="color:var(--accent)">${completed}</div>
        <div class="stat-sub">Fully done</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📁 Recent Projects</div>
      ${projects.length === 0 ? `<div class="empty-state"><div class="empty-icon">📭</div><p>No projects yet. Create your first project!</p></div>` :
      `<div class="table-wrap"><table>
        <thead><tr>
          <th>Project ID</th><th>Name</th><th>Client</th><th>Progress</th><th>Status</th><th>Action</th>
        </tr></thead>
        <tbody>
        ${projects.slice(-6).reverse().map(p => {
          const pct = projectProgress(p);
          const st = projectStatus(p);
          return `<tr>
            <td><span style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">${p.id}</span></td>
            <td><strong>${p.name}</strong></td>
            <td>${p.client||'—'}</td>
            <td>
              <div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${pct}%"></div></div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px">${pct}%</div>
            </td>
            <td><span class="badge ${st==='delayed'?'badge-danger':st==='completed'?'badge-success':'badge-info'}">${st}</span></td>
            <td><button class="btn btn-sm btn-outline" onclick="adminOpenProject('${p.id}')">View</button></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>`}
    </div>
  `;
};

// ─── ADMIN ALL PROJECTS ───
pages.adminProjects = function(el) {
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div class="page-title">All Projects</div>
        <div class="page-sub">Manage and monitor all manufacturing projects</div>
      </div>
      <button class="btn" onclick="showPage('adminNewProject')">+ New Project</button>
    </div>
    <div id="projectsGrid"></div>
  `;
  renderProjectsGrid();
};

function renderProjectsGrid() {
  const grid = document.getElementById('projectsGrid');
  if (!grid) return;
  if (!DB.projects.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No projects yet. <a href="#" onclick="showPage('adminNewProject')" style="color:var(--accent)">Create one →</a></p></div>`;
    return;
  }
  grid.innerHTML = `<div class="projects-grid">${DB.projects.map(p => {
    const pct = projectProgress(p);
    const st = projectStatus(p);
    const cls = st === 'delayed' ? 'overdue-flash' : '';
    return `<div class="project-card ${st==='delayed'?'delayed':''} ${cls}" onclick="adminOpenProject('${p.id}')">
      <div class="project-card-header">
        <div>
          <div class="project-name">${p.name}</div>
          <div class="project-id">${p.id}</div>
        </div>
        <span class="badge ${st==='delayed'?'badge-danger':st==='completed'?'badge-success':'badge-info'}">${st}</span>
      </div>
      <div class="project-meta">
        <span class="badge badge-muted">👤 ${p.client||'No Client'}</span>
        ${p.endDate ? `<span class="badge badge-muted">📅 ${fmtDate(p.endDate)}</span>` : ''}
      </div>
      <div class="project-progress">
        <div class="progress-label"><span>Overall Progress</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ─── ADMIN NEW PROJECT ───
pages.adminNewProject = function(el) {
  el.innerHTML = `
    <div class="page-title">Create New Project</div>
    <div class="page-sub">Onboard a new manufacturing project</div>
    <div class="card" style="max-width:600px">
      <div class="form-row">
        <div class="form-group">
          <label>Project Name *</label>
          <input type="text" id="np-name" placeholder="e.g. Boiler Assembly Unit">
        </div>
        <div class="form-group">
          <label>Client Name</label>
          <input type="text" id="np-client" placeholder="e.g. ABC Industries">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="np-start">
        </div>
        <div class="form-group">
          <label>Expected End Date</label>
          <input type="date" id="np-end">
        </div>
      </div>
      <div class="form-group">
        <label>Project Description</label>
        <textarea id="np-desc" placeholder="Brief description of the project scope..."></textarea>
      </div>
      <div class="form-group">
        <label>Project Value (₹)</label>
        <input type="number" id="np-value" placeholder="e.g. 5000000">
      </div>
      <div style="margin-top:8px">
        <button class="btn" onclick="createProject()">Create Project →</button>
        <button class="btn-outline" style="margin-left:10px" onclick="showPage('adminProjects')">Cancel</button>
      </div>
    </div>
  `;
  document.getElementById('np-start').value = today();
};

function createProject() {
  const name = document.getElementById('np-name').value.trim();
  if (!name) { showToast('Project name is required','error'); return; }
  const proj = {
    id: makeProjectId(),
    name,
    client: document.getElementById('np-client').value.trim(),
    startDate: document.getElementById('np-start').value,
    endDate: document.getElementById('np-end').value,
    desc: document.getElementById('np-desc').value.trim(),
    value: document.getElementById('np-value').value,
    createdAt: today(),
    delayed: false
  };
  initProjectDeptSteps(proj);
  DB.projects.push(proj);
  DB.nextProjectId++;
  saveData(DB);
  showToast('Project ' + proj.id + ' created!', 'success');
  showPage('adminProjects');
}

// ─── ADMIN: OPEN PROJECT DETAIL ───
function adminOpenProject(projId) {
  const proj = DB.projects.find(p=>p.id===projId);
  if (!proj) return;
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  const pct = projectProgress(proj);
  const st = projectStatus(proj);
  const overdueItems = getOverdueItems().filter(i=>i.proj.id===projId);

  main.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
      <button class="btn-outline btn-sm" onclick="showPage('adminProjects')">← Back</button>
      <div class="page-title">${proj.name}</div>
      <span class="badge ${st==='delayed'?'badge-danger':st==='completed'?'badge-success':'badge-info'}">${st}</span>
    </div>
    <div class="page-sub">${proj.id} • Client: ${proj.client||'—'} • Value: ${proj.value?'₹'+Number(proj.value).toLocaleString('en-IN'):'—'}</div>

    ${overdueItems.length ? `<div class="delay-banner">⚠️ ${overdueItems.length} overdue step(s) — project is <strong>DELAYED</strong>.</div>` : ''}

    <div style="display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:20px">
      <div class="card">
        <div class="card-title">📊 Overall Progress</div>
        <div class="progress-label" style="margin-bottom:8px"><span>Completion</span><strong>${pct}%</strong></div>
        <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><div style="font-size:11px;color:var(--muted)">Start Date</div><div style="font-family:var(--font-mono);font-size:13px;margin-top:2px">${fmtDate(proj.startDate)}</div></div>
          <div><div style="font-size:11px;color:var(--muted)">End Date</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
              <input class="inline-input" type="date" id="proj-end-edit" value="${proj.endDate||''}" onchange="updateProjectDate('${proj.id}','endDate',this.value)" style="padding:2px 6px;font-size:12px">
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🏭 Dept Progress</div>
        ${DEPTS.map(d=>{
          const dp = deptProgress(proj,d);
          return `<div style="margin-bottom:8px">
            <div class="progress-label" style="margin-bottom:3px"><span style="font-size:12px">${d}</span><span style="font-size:11px;font-family:var(--font-mono)">${dp}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${dp}%;background:${dp===100?'var(--success)':dp>50?'var(--accent)':'var(--warn)'}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Department Steps & Deadlines <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:8px">— Admin can edit deadlines</span></div>
      <div class="dept-pipeline" id="deptPipeline">
        ${DEPTS.map(dept => renderDeptRows(proj, dept)).join('')}
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-danger btn-sm" onclick="deleteProject('${proj.id}')">🗑 Delete Project</button>
    </div>
  `;
}

function renderDeptRows(proj, dept) {
  const steps = proj.deptSteps[dept] || [];
  const hasOverdue = steps.some(s=>s.status!=='done'&&isOverdue(s.deadline));
  return `<div class="dept-row ${hasOverdue?'overdue-flash':''}">
    <div class="dept-name">${dept}</div>
    <div class="dept-steps">
      ${steps.map((s,i) => {
        let cls = s.status==='done'?'done':s.status==='inprogress'?'inprogress':(s.status!=='done'&&isOverdue(s.deadline))?'overdue':'';
        return `<div class="step-chip ${cls}" title="${s.name}${s.deadline?' — due: '+fmtDate(s.deadline):''}${s.note?' — '+s.note:''}" onclick="adminEditStep('${proj.id}','${dept}',${i})">${s.name}</div>`;
      }).join('')}
      <button class="step-chip" onclick="adminAddStep('${proj.id}','${dept}')" title="Add step" style="color:var(--accent);border-color:var(--accent);cursor:pointer">+ Add</button>
    </div>
    <div class="dept-deadline">${steps.filter(s=>s.status!=='done').length} pending</div>
  </div>`;
}

function adminEditStep(projId, dept, stepIdx) {
  const proj = DB.projects.find(p=>p.id===projId);
  const s = proj.deptSteps[dept][stepIdx];
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Edit Step</div>
    <div class="modal-sub">${proj.name} → ${dept}</div>
    <div class="form-group"><label>Step Name</label><input type="text" id="es-name" value="${s.name}"></div>
    <div class="form-row">
      <div class="form-group"><label>Deadline</label><input type="date" id="es-deadline" value="${s.deadline||''}"></div>
      <div class="form-group"><label>Status</label>
        <select id="es-status">
          <option value="pending" ${s.status==='pending'?'selected':''}>Pending</option>
          <option value="inprogress" ${s.status==='inprogress'?'selected':''}>In Progress</option>
          <option value="done" ${s.status==='done'?'selected':''}>Done</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Note</label><textarea id="es-note">${s.note||''}</textarea></div>
    <div class="form-actions">
      <button class="btn-outline" onclick="adminDeleteStep('${projId}','${dept}',${stepIdx})">Delete Step</button>
      <button class="btn" onclick="adminSaveStep('${projId}','${dept}',${stepIdx})">Save Changes</button>
    </div>
  `);
}

function adminSaveStep(projId, dept, stepIdx) {
  const proj = DB.projects.find(p=>p.id===projId);
  const s = proj.deptSteps[dept][stepIdx];
  s.name = document.getElementById('es-name').value;
  s.deadline = document.getElementById('es-deadline').value;
  s.status = document.getElementById('es-status').value;
  s.note = document.getElementById('es-note').value;
  saveData(DB);
  closeModal();
  updateAlerts();
  adminOpenProject(projId);
  showToast('Step updated!','success');
}

function adminDeleteStep(projId, dept, stepIdx) {
  const proj = DB.projects.find(p=>p.id===projId);
  proj.deptSteps[dept].splice(stepIdx,1);
  saveData(DB);
  closeModal();
  adminOpenProject(projId);
  showToast('Step deleted');
}

function adminAddStep(projId, dept) {
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Add Step</div>
    <div class="modal-sub">${dept} department</div>
    <div class="form-group"><label>Step Name *</label><input type="text" id="as-name" placeholder="e.g. Final Review"></div>
    <div class="form-group"><label>Deadline</label><input type="date" id="as-deadline"></div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="doAddStep('${projId}','${dept}')">Add Step</button>
    </div>
  `);
}

function doAddStep(projId, dept) {
  const name = document.getElementById('as-name').value.trim();
  if (!name) { showToast('Step name required','error'); return; }
  const proj = DB.projects.find(p=>p.id===projId);
  proj.deptSteps[dept].push({ id: Date.now(), name, status:'pending', deadline: document.getElementById('as-deadline').value, note:'' });
  saveData(DB);
  closeModal();
  updateAlerts();
  adminOpenProject(projId);
  showToast('Step added!','success');
}

function updateProjectDate(projId, field, val) {
  const proj = DB.projects.find(p=>p.id===projId);
  proj[field] = val;
  saveData(DB);
  showToast('Date updated!','success');
  updateAlerts();
}

function deleteProject(projId) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  DB.projects = DB.projects.filter(p=>p.id!==projId);
  saveData(DB);
  showToast('Project deleted');
  showPage('adminProjects');
}

// ─── DEPT DASHBOARD ───
pages.deptDashboard = function(el) {
  const dept = DEPTS.find(d=>d.toLowerCase()===currentUser.dept);
  const myProjects = DB.projects.filter(p=>p.deptSteps[dept]&&p.deptSteps[dept].length);
  const overdue = getOverdueItems().filter(i=>i.dept===dept);

  el.innerHTML = `
    <div class="page-title">${dept} Department</div>
    <div class="page-sub">Your work across all active projects</div>

    ${overdue.length ? `<div class="delay-banner">⚠️ You have ${overdue.length} overdue step(s). Please update immediately.</div>` : ''}

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Projects</div>
        <div class="stat-value">${myProjects.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value" style="color:var(--danger)">${overdue.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Steps Done</div>
        <div class="stat-value" style="color:var(--success)">${myProjects.reduce((acc,p)=>(p.deptSteps[dept]||[]).filter(s=>s.status==='done').length+acc,0)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" style="color:var(--warn)">${myProjects.reduce((acc,p)=>(p.deptSteps[dept]||[]).filter(s=>s.status!=='done').length+acc,0)}</div>
      </div>
    </div>

    ${myProjects.length===0?`<div class="empty-state"><div class="empty-icon">📭</div><p>No projects assigned yet.</p></div>`:''}

    ${myProjects.map(p=>{
      const steps = p.deptSteps[dept]||[];
      const dp = deptProgress(p,dept);
      return `<div class="card">
        <div class="card-title">${p.name} <span style="font-size:12px;color:var(--muted);font-weight:400">${p.id}</span>
          <span class="badge badge-muted" style="margin-left:auto">${dp}% done</span>
        </div>
        <div class="dept-steps">
          ${steps.map(s=>{
            const ov=s.status!=='done'&&isOverdue(s.deadline);
            const cls=s.status==='done'?'done':s.status==='inprogress'?'inprogress':ov?'overdue':'';
            const dl=daysLeft(s.deadline);
            return `<div class="step-chip ${cls}" title="${fmtDate(s.deadline)}">${s.name}${s.deadline?` <span style="font-size:9px">(${ov?'⚠ '+Math.abs(dl)+'d late':dl===0?'Today':dl>0?dl+'d':''})</span>`:''}`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  `;
};

// ─── DEPT UPDATE ───
pages.deptUpdate = function(el) {
  const dept = DEPTS.find(d=>d.toLowerCase()===currentUser.dept);
  const myProjects = DB.projects;

  el.innerHTML = `
    <div class="page-title">Update Work — ${dept}</div>
    <div class="page-sub">Mark your steps as complete or in progress</div>

    ${myProjects.length===0?`<div class="empty-state"><div class="empty-icon">📭</div><p>No projects to update.</p></div>`:''}

    ${myProjects.map(p=>{
      const steps = p.deptSteps[dept]||[];
      return `<div class="card">
        <div class="card-title">${p.name} <span style="font-size:12px;color:var(--muted);font-weight:400">${p.id}</span></div>
        ${steps.length===0?'<div style="color:var(--muted);font-size:13px">No steps defined for this project yet.</div>':
          steps.map((s,i)=>{
            const ov=s.status!=='done'&&isOverdue(s.deadline);
            return `<div class="step-update-row ${ov?'':''}">
              <div class="step-num">#${i+1}</div>
              <div class="step-name-label">
                <div style="font-weight:500">${s.name}</div>
                ${s.note?`<div style="font-size:11px;color:var(--muted)">${s.note}</div>`:''}
              </div>
              <div class="step-deadline-info" style="color:${ov?'var(--danger)':''}">${s.deadline?fmtDate(s.deadline)+(ov?' ⚠':daysLeft(s.deadline)!==null?' ('+daysLeft(s.deadline)+'d)':''):'No deadline'}</div>
              <select class="step-status-select" onchange="updateStepStatus('${p.id}','${dept}',${i},this.value)">
                <option value="pending" ${s.status==='pending'?'selected':''}>Pending</option>
                <option value="inprogress" ${s.status==='inprogress'?'selected':''}>In Progress</option>
                <option value="done" ${s.status==='done'?'selected':''}>✓ Done</option>
              </select>
              <button class="btn-outline btn-sm" onclick="deptAddNote('${p.id}','${dept}',${i})">Note</button>
            </div>`;
          }).join('')
        }
      </div>`;
    }).join('')}
  `;
};

function updateStepStatus(projId, dept, stepIdx, val) {
  const proj = DB.projects.find(p=>p.id===projId);
  proj.deptSteps[dept][stepIdx].status = val;
  saveData(DB);
  updateAlerts();
  showToast('Status updated!','success');
}

function deptAddNote(projId, dept, stepIdx) {
  const proj = DB.projects.find(p=>p.id===projId);
  const s = proj.deptSteps[dept][stepIdx];
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Add Note</div>
    <div class="modal-sub">${s.name}</div>
    <div class="form-group"><label>Note / Remark</label><textarea id="dn-note" placeholder="Enter your update, remark, or issue...">${s.note||''}</textarea></div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveDeptNote('${projId}','${dept}',${stepIdx})">Save Note</button>
    </div>
  `);
}

function saveDeptNote(projId, dept, stepIdx) {
  const proj = DB.projects.find(p=>p.id===projId);
  proj.deptSteps[dept][stepIdx].note = document.getElementById('dn-note').value;
  saveData(DB);
  closeModal();
  showPage('deptUpdate');
  showToast('Note saved!','success');
}

// ─── HOD OVERVIEW ───
pages.hodOverview = function(el) {
  const total = DB.projects.length;
  const delayed = DB.projects.filter(p=>projectStatus(p)==='delayed').length;
  const completed = DB.projects.filter(p=>projectStatus(p)==='completed').length;
  const overdueCount = getOverdueItems().length;

  el.innerHTML = `
    <div class="page-title">HOD Overview</div>
    <div class="page-sub">Head of Department — complete project visibility</div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Projects</div><div class="stat-value">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Delayed</div><div class="stat-value" style="color:var(--danger)">${delayed}</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" style="color:var(--success)">${completed}</div></div>
      <div class="stat-card"><div class="stat-label">Overdue Tasks</div><div class="stat-value" style="color:var(--warn)">${overdueCount}</div></div>
    </div>

    ${DB.projects.length===0?`<div class="empty-state"><div class="empty-icon">📭</div><p>No projects onboarded yet.</p></div>`:''}

    ${DB.projects.map(p=>{
      const st = projectStatus(p);
      const pct = projectProgress(p);
      return `<div class="hod-project-row">
        <div class="hod-proj-header" onclick="hodToggle('hod-body-${p.id}',this)">
          <div class="hod-proj-name">${p.name}</div>
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${p.id}</span>
          <span class="badge ${st==='delayed'?'badge-danger':st==='completed'?'badge-success':'badge-info'}">${st}</span>
          <div class="progress-bar" style="width:100px"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span style="font-size:12px;font-family:var(--font-mono)">${pct}%</span>
          <span class="chevron">›</span>
        </div>
        <div id="hod-body-${p.id}" style="display:none">
          <div class="hod-dept-grid">
            ${DEPTS.map(d=>{
              const steps=p.deptSteps[d]||[];
              const dp=deptProgress(p,d);
              const dOverdue=steps.some(s=>s.status!=='done'&&isOverdue(s.deadline));
              return `<div class="hod-dept-cell" style="${dOverdue?'border:1px solid var(--danger);animation:flash-border 1.6s infinite':''}">
                <div class="hod-dept-label">${d}</div>
                <div class="hod-dept-pct" style="color:${dp===100?'var(--success)':dOverdue?'var(--danger)':'var(--text)'}">${dp}%</div>
                <div style="font-size:10px;color:var(--muted);margin-top:3px">${steps.filter(s=>s.status==='done').length}/${steps.length} done</div>
                ${dOverdue?`<div style="font-size:10px;color:var(--danger);margin-top:2px">⚠ Overdue</div>`:''}
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>`;
    }).join('')}
  `;
};

pages.hodProjects = function(el) {
  el.innerHTML = `
    <div class="page-title">All Projects — HOD View</div>
    <div class="page-sub">Full read-only view of all projects and step status</div>
    ${DB.projects.map(p=>{
      const st = projectStatus(p);
      return `<div class="card">
        <div class="card-title">${p.name} <span style="font-size:12px;color:var(--muted);font-weight:400">${p.id} • ${p.client||'No client'}</span>
          <span class="badge ${st==='delayed'?'badge-danger':st==='completed'?'badge-success':'badge-info'}" style="margin-left:auto">${st}</span>
        </div>
        <div class="dept-pipeline">
          ${DEPTS.map(dept=>{
            const steps=p.deptSteps[dept]||[];
            const hasOverdue=steps.some(s=>s.status!=='done'&&isOverdue(s.deadline));
            return `<div class="dept-row ${hasOverdue?'overdue-flash':''}">
              <div class="dept-name">${dept}</div>
              <div class="dept-steps">
                ${steps.map(s=>{
                  const cls=s.status==='done'?'done':s.status==='inprogress'?'inprogress':(s.status!=='done'&&isOverdue(s.deadline))?'overdue':'';
                  return `<div class="step-chip ${cls}" title="${s.name} — ${fmtDate(s.deadline)}">${s.name}</div>`;
                }).join('')}
              </div>
              <div class="dept-deadline">${deptProgress(p,dept)}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
    ${!DB.projects.length?`<div class="empty-state"><div class="empty-icon">📭</div><p>No projects yet.</p></div>`:''}
  `;
};

function hodToggle(id, el) {
  const body = document.getElementById(id);
  const chev = el.querySelector('.chevron');
  if (body.style.display==='none') {
    body.style.display='block';
    if(chev) chev.classList.add('open');
  } else {
    body.style.display='none';
    if(chev) chev.classList.remove('open');
  }
}

// ─── ENGINEER DASHBOARD ───

    <div class="page-title">Project Engineer Dashboard</div>
    <div class="page-sub">Track all projects and monitor overdue tasks</div>

    ${overdueItems.length ? `<div class="delay-banner" style="animation:flash-border 1.5s infinite">⚠️ <strong>${overdueItems.length} overdue task(s)</strong> across projects — immediate attention required!</div>` : '<div style="background:rgba(0,201,122,0.1);border:1px solid rgba(0,201,122,0.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;color:var(--success);font-size:13px;">✅ All tasks are on track. No overdue items.</div>'}

      <div class="stat-card"><div class="stat-label">Overdue Tasks</div><div class="stat-value" style="color:var(--warn)">${overdueItems.length}</div></div>
